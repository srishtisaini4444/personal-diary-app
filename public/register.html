<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>

    <h1>Register</h1>

    <form action="/register" method="POST">

        <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Username"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <script src="js/register.js"></script>

</body>
</html>
