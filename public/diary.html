<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diary</title>
</head>
<body>

    <h1>Personal Diary</h1>

    <form action="/add-entry" method="POST">

        <textarea
            name="entry"
            rows="10"
            cols="50"
            placeholder="Write your thoughts..."
            required
        ></textarea>

        <br><br>

        <button type="submit">
            Save Entry
        </button>

    </form>

</body>
</html>
